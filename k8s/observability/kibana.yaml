# k8s/observability/kibana.yaml
#
# Kibana — the web UI for searching and visualizing logs in Elasticsearch.
#
# After deployment, access Kibana:
#   kubectl port-forward svc/kibana -n observability 5601:5601 --address 0.0.0.0
#   Open: http://10.0.0.148:5601
#
# First-time setup in Kibana:
#   1. Go to Stack Management → Data Views
#   2. Create pattern: nodejs-logs-*
#   3. Set Time field: @timestamp
#   4. Go to Discover → search your logs
#   5. Create dashboards for error rates, response times, etc.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: observability
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.11.1
          ports:
            - containerPort: 5601
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch:9200"
            - name: SERVER_NAME
              value: "kibana"
            # Disable telemetry
            - name: TELEMETRY_ENABLED
              value: "false"
            # Reduce Node.js memory usage
            - name: NODE_OPTIONS
              value: "--max-old-space-size=400"
          resources:
            requests:
              cpu: 100m       # reduced from 200m
              memory: 512Mi   # reduced from 512Mi
            limits:
              cpu: 500m       # reduced from 500m
              memory: 1Gi   # reduced from 1Gi
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: observability
  labels:
    app: kibana
spec:
  type: ClusterIP
  ports:
    - port: 5601
      targetPort: 5601
  selector:
    app: kibana